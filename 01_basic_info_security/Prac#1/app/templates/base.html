<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}BookVault{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

</head>
<body>

<!-- Навигация -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('main.index') }}">📚 BookVault</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('main.index') }}">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('main.practice') }}">Практика</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('admin.login') }}">Админка</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('comments.list_comments') }}">Комментарии</a>
                </li>

            </ul>
        </div>
    </div>
</nav>



<!-- Контент -->
<main class="py-4">
    {% block content %}{% endblock %}
</main>

<!-- Футер -->
<footer class="bg-dark text-light text-center py-4 mt-auto">
    <div class="container">
        <p class="mb-1">Практическая работа №1 по информационной безопасности</p>
        <a href="https://github.com/Gavriilbolt/course_materials" class="text-light" target="_blank">
            <i class="fab fa-github me-1"></i> Репозиторий на GitHub
        </a>
    </div>
</footer>

<!-- Bootstrap JS (если нужно JS-меню) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- jQuery + Select2 JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

{% block scripts %}{% endblock %}
</body>
</html>
